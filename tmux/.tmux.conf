# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

# Config
unbind C-b
set -g prefix M-b
bind M-b send-prefix

bind -n M-c new-window
bind -n M-x kill-pane
bind -n M-& kill-window

# Color scheme
set -g default-terminal "screen-256color"
set -g status-bg black
set -g status-fg white

# Refresh configuration file
bind r source-file ~/.tmux.conf \; display-message "Configuration reloaded."

set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Navigate between windows
bind -n M-p previous-window
bind -n M-n next-window

# Kill without confirmation
bind-key & kill-window
bind-key x kill-pane

# set vi-mode
set-window-option -g mode-keys vi

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

bind-key -n M-Up    resize-pane -U 5
bind-key -n M-Down  resize-pane -D 5
bind-key -n M-Left  resize-pane -L 5
bind-key -n M-Right resize-pane -R 5

# Layout menu
bind-key Space display-menu -T "Choose a Layout" -x C -y C \
    "Even Horizontal"  h "select-layout even-horizontal" \
    "Even Vertical"    v "select-layout even-vertical" \
    "Main Horizontal"  H "select-layout main-horizontal" \
    "Main Vertical"    V "select-layout main-vertical" \
    "Tiled"            t "select-layout tiled" \
    "" \
    "Close Menu"       q ""

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '/opt/homebrew/opt/tpm/share/tpm/tpm'
